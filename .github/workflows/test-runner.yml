# 工作流名称（自定义）
name: Test Self-hosted Runner on Rocky 8.7

# 触发条件：推送到 main 分支时自动执行
on:
  push:
    branches: [ main ]
  # 可选：允许手动触发（在 GitHub Actions 页面点击 "Run workflow"）
  workflow_dispatch:

# 定义要执行的任务
jobs:
  test-runner:
    # 关键：指定使用自托管 Runner
    runs-on: self-hosted
    # 任务步骤
    steps:
      # 步骤1：拉取仓库代码到 Runner 服务器
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2：输出服务器基础信息（验证 Runner 环境）
      - name: Show server info
        run: |
          echo "✅ 自托管 Runner 执行成功！"
          echo "--------------------------"
          echo "服务器系统信息："
          cat /etc/os-release | grep PRETTY_NAME
          echo "--------------------------"
          echo "当前运行用户："
          whoami
          echo "--------------------------"
          echo "Runner 工作目录："
          pwd
